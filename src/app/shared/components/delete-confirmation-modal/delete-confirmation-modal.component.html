<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/45 p-4" (click)="onCancel()" role="button"
  tabindex="0">
  <section class="w-full max-w-md rounded-xl border border-border bg-card p-5 shadow-xl"
    (click)="$event.stopPropagation()" role="dialog" aria-modal="true" [attr.aria-label]="label">
    <h3 class="text-lg font-semibold">{{ label }}</h3>
    <p class="mt-2 text-sm text-muted-foreground">{{ message }}</p>

    <footer class="mt-5 flex justify-end gap-2">
      <button type="button" (click)="onCancel()"
        class="inline-flex h-10 items-center justify-center rounded-md border border-border bg-background px-4 text-sm font-medium transition hover:bg-muted">
        Cancel
      </button>

      <button type="button" (click)="onConfirm()"
        class="inline-flex h-10 items-center justify-center rounded-md bg-destructive px-4 text-sm font-medium text-destructive-foreground transition hover:brightness-95">
        Delete
      </button>
    </footer>
  </section>
</div>
