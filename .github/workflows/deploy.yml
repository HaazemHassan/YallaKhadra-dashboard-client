name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build -- --base-href /YallaKhadra-dashboard-client/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/yalla-khadra/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
